name: release-cli

# Triggered when a `cli-v*` tag is pushed (e.g. `cli-v0.1.0`).
# Builds five signed binaries via bun cross-compile, attaches them to the
# GitHub release, publishes @qkb/cli to npm, then bumps the Homebrew tap
# formula. macOS notarization + Windows Authenticode signing are gated on
# secrets; without them those matrix legs fail (see docs/cli-release.md).

on:
  push:
    tags: ['cli-v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            bun: bun-linux-x64
            ext: ''
          - os: ubuntu-latest
            target: linux-arm64
            bun: bun-linux-arm64
            ext: ''
          - os: macos-14
            target: darwin-arm64
            bun: bun-darwin-arm64
            ext: ''
          - os: macos-13
            target: darwin-x64
            bun: bun-darwin-x64
            ext: ''
          - os: windows-latest
            target: windows-x64
            bun: bun-windows-x64
            ext: '.exe'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: oven-sh/setup-bun@v2
      - run: pnpm install --frozen-lockfile
      - name: Cross-compile via bun
        shell: bash
        run: |
          mkdir -p packages/qkb-cli/dist-binaries
          bun build packages/qkb-cli/src/cli.ts \
            --compile \
            --target=${{ matrix.bun }} \
            --outfile packages/qkb-cli/dist-binaries/qkb-${{ matrix.target }}${{ matrix.ext }}

      - name: Sign + notarize macOS binary
        if: matrix.os == 'macos-14' || matrix.os == 'macos-13'
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_ID:           ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID:      ${{ secrets.APPLE_TEAM_ID }}
        run: |
          BIN="packages/qkb-cli/dist-binaries/qkb-${{ matrix.target }}"
          codesign --sign "$APPLE_DEVELOPER_ID" --options runtime --timestamp "$BIN"
          xcrun notarytool submit "$BIN" \
            --apple-id "$APPLE_ID" --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" --wait

      - name: Sign Windows binary (Authenticode)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $cert = "${{ secrets.WIN_PFX_BASE64 }}"
          [IO.File]::WriteAllBytes("cert.pfx", [Convert]::FromBase64String($cert))
          $bin = "packages/qkb-cli/dist-binaries/qkb-${{ matrix.target }}.exe"
          $signtool = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22000.0\x64\signtool.exe"
          & $signtool sign `
            /f cert.pfx /p "${{ secrets.WIN_PFX_PASSWORD }}" `
            /tr http://timestamp.digicert.com /td SHA256 /fd SHA256 `
            $bin

      - name: Smoke version
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            ./packages/qkb-cli/dist-binaries/qkb-${{ matrix.target }}.exe version
          else
            ./packages/qkb-cli/dist-binaries/qkb-${{ matrix.target }} version
          fi

      - uses: softprops/action-gh-release@v2
        with:
          files: packages/qkb-cli/dist-binaries/qkb-${{ matrix.target }}${{ matrix.ext }}

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F @qkb/cli build
      - run: pnpm -F @qkb/cli publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  update-tap:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: qkb-eth/homebrew-qkb
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - name: Bump formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/cli-v}
          gh release download "cli-v$TAG" -R qkb-eth/identityescroworg -p "qkb-*"
          for f in qkb-darwin-arm64 qkb-darwin-x64 qkb-linux-x64 qkb-linux-arm64; do
            sha=$(sha256sum "$f" | awk '{print $1}')
            # Replace the sha256 line that follows the matching url line.
            python3 - "$f" "$sha" <<'PY'
          import re, sys
          fname, sha = sys.argv[1], sys.argv[2]
          path = "Formula/qkb.rb"
          src = open(path).read()
          pattern = re.compile(
              r'(url\s+"[^"]*' + re.escape(fname) + r'"\s*\n\s*sha256\s+")[^"]*(")',
              re.MULTILINE,
          )
          new = pattern.sub(rf'\g<1>{sha}\g<2>', src, count=1)
          open(path, "w").write(new)
          PY
          done
          # Bump version
          sed -i.bak -E "s|version \".*\"|version \"$TAG\"|" Formula/qkb.rb
          rm -f Formula/qkb.rb.bak
      - name: Commit + push tap update
        run: |
          git config user.name  "qkb-bot"
          git config user.email "bot@identityescrow.org"
          git add Formula/qkb.rb
          git commit -m "qkb $GITHUB_REF_NAME"
          git push

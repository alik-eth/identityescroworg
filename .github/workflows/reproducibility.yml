name: Reproducibility

on:
  schedule:
    - cron: "17 3 * * *" # nightly 03:17 UTC
  workflow_dispatch:

jobs:
  rebuild-circuit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: "9.1.0" }
      - uses: actions/setup-node@v4
        with: { node-version: "20.11.1", cache: "pnpm" }
      - name: Install circom
        run: |
          curl -L -o /tmp/circom https://github.com/iden3/circom/releases/download/v2.1.9/circom-linux-amd64
          chmod +x /tmp/circom && sudo mv /tmp/circom /usr/local/bin/circom
      - run: pnpm install --frozen-lockfile
      - name: Compile + setup + export
        run: |
          bash packages/circuits/ceremony/scripts/compile.sh
          bash packages/circuits/ceremony/scripts/setup.sh
          bash packages/circuits/ceremony/scripts/export.sh
      - name: Compare zkey hash
        run: |
          expected=$(cat packages/circuits/build/qkb-presentation/zkey.sha256.baseline)
          actual=$(sha256sum packages/circuits/build/qkb-presentation/qkb.zkey | awk '{print $1}')
          echo "expected=$expected actual=$actual"
          [ "$expected" = "$actual" ] || { echo "zkey drift"; exit 1; }

  rebuild-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: "9.1.0" }
      - uses: actions/setup-node@v4
        with: { node-version: "20.11.1", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @qkb/web build
      - name: Hash dist (timestamps excluded)
        run: |
          cd packages/web/dist
          find . -type f ! -name '*.map' | sort | xargs sha256sum > ../dist.sha256
          cat ../dist.sha256 | sha256sum

<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>QKB — Qualified Key Binding</title>
    <script>
      // GitHub Pages SPA redirect (rafgraph/spa-github-pages pattern).
      // Repo is served from /identityescroworg/; forward deep links to
      // index.html with the original path encoded in the query so the
      // TanStack router can pick it up.
      (function () {
        var segmentCount = 1; // /identityescroworg
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>

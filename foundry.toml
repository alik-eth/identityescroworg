[profile.default]
src = "packages/contracts/src"
out = "packages/contracts/out"
test = "packages/contracts/test"
script = "packages/contracts/script"
cache_path = "packages/contracts/cache"
libs = ["packages/contracts/lib"]
remappings = [
  "forge-std/=packages/contracts/lib/forge-std/src/",
  "openzeppelin-contracts/=packages/contracts/lib/openzeppelin-contracts/",
]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [{ access = "read", path = "./packages/contracts/test/fixtures" }]

[profile.ci]
verbosity = 3
fuzz = { runs = 256 }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
